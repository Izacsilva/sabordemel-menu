    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#edcd2c",
                        "accent": "#f26522",
                        "background-light": "#f8f8f6",
                        "background-dark": "#131313",
                        "surface-dark": "#1e1e1e",
                        "surface-dark-alt": "#2a2a2a"
                    },
                    fontFamily: {
                        "display": ["'Barlow Condensed'", "sans-serif"],
                        "body": ["'Lato'", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { min-height: 100dvh; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: opacity 0.3s ease, transform 0.3s ease; }
        .product-card.card-visible { opacity: 1; transform: translateY(0) scale(1); }
        .category-chip.active { background-color: #edcd2c; color: #131313; font-weight: 600; border-color: transparent; }

        /* ── Cart Drawer ── */
        #cart-drawer {
            position: fixed; top: 0; right: 0; height: 100dvh;
            width: min(400px, 100vw);
            background: #1a1a1a;
            border-left: 1px solid #2a2a2a;
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
            display: flex; flex-direction: column;
            box-shadow: -8px 0 32px rgba(0,0,0,0.5);
        }
        #cart-drawer.open { transform: translateX(0); }
        #cart-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(3px);
            z-index: 199;
            opacity: 0; pointer-events: none;
            transition: opacity 0.32s ease;
        }
        #cart-overlay.open { opacity: 1; pointer-events: auto; }

        /* Badge do carrinho */
        #cart-badge {
            position: absolute; top: 2px; right: 2px;
            width: 18px; height: 18px; border-radius: 50%;
            background: #f26522; color: #fff;
            font-size: 10px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: scale(0);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }
        #cart-badge.visible { opacity: 1; transform: scale(1); }

        /* Animação de bounce ao adicionar */
        @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.35)} }
        .cart-pop { animation: pop 0.25s ease; }

        /* Itens do carrinho */
        .cart-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a2a;
            animation: slideInRight 0.2s ease;
        }
        @keyframes slideInRight { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
        .qty-btn {
            width: 28px; height: 28px; border-radius: 50%;
            background: #2a2a2a; color: #edcd2c;
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; font-size: 18px; font-weight: 700;
            transition: background 0.15s, transform 0.1s;
        }
        .qty-btn:hover { background: #333; transform: scale(1.1); }

        /* Input estilizado */
        .cart-input {
            width: 100%; background: #252525; border: 1px solid #333;
            border-radius: 10px; padding: 10px 12px;
            color: #e2e8f0; font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }
        .cart-input:focus { border-color: #edcd2c; }
        .cart-input::placeholder { color: #555; }

        /* Radio custom */
        .delivery-option { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .delivery-option input[type=radio] { accent-color: #edcd2c; width: 16px; height: 16px; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-body antialiased min-h-screen">

        </div>

        <div class="px-5">

        </div>

            </div>
        </div>
    </main>

        window.changeModalSize = function(s) {
            currentModalSize = s;
            // Ao mudar o tamanho, validamos as seleções atuais contra os novos limites
            var limits = currentModalProduct.limits[s];
            if (limits) {
                Object.keys(currentModalSelections).forEach(function(cat) {
                    if (currentModalSelections[cat].length > (limits[cat] || 0)) {
                        currentModalSelections[cat] = currentModalSelections[cat].slice(0, limits[cat]);
                    }
                });
            }
            renderModal();
        };

        window.toggleSelection = function(cat, item) {
            if (!currentModalSelections[cat]) currentModalSelections[cat] = [];
            var idx = currentModalSelections[cat].indexOf(item);
            if (idx === -1) {
                var max = currentModalProduct.limits[currentModalSize][cat];
                if (currentModalSelections[cat].length < max) {
                    currentModalSelections[cat].push(item);
                }
            } else {
                currentModalSelections[cat].splice(idx, 1);
            }
            renderModal();
        };

        window.toggleExtra = function(name, price) {
            var idx = -1;
            currentModalExtras.forEach(function(e, i) { if (e.nome === name) idx = i; });
            if (idx === -1) {
                currentModalExtras.push({ nome: name, preco: price });
            } else {
                currentModalExtras.splice(idx, 1);
            }
            renderModal();
        };

        function updateModalPrice() {
            var p = currentModalProduct;
            if (!p) return;
            var base = p.prices ? p.prices[currentModalSize] : p.price;
            var extrasTotal = currentModalExtras.reduce(function(s, e) { return s + (e.preco || 0); }, 0);
            document.getElementById('modal-total-price').textContent = 'R$ ' + (base + extrasTotal).toFixed(2);
        }

            try { localStorage.setItem('sabordemel_cart', JSON.stringify(cartState)); } catch(e) {}
        }
        function loadCart() {
            try {
                var saved = localStorage.getItem('sabordemel_cart');
                if (saved) cartState = JSON.parse(saved);
            } catch(e) { cartState = []; }

        var cartBadge = document.getElementById('cart-badge');
        function updateBadge() {
            var total = cartState.reduce(function(s, i) { return s + i.qty; }, 0);
            cartBadge.textContent = total;
            if (total > 0) { cartBadge.classList.add('visible'); }
            else { cartBadge.classList.remove('visible'); }
        }

        // --- addToCart ---
        function addToCart(product, size, extras) {
            var unitPrice = (size && product.prices) ? product.prices[size] : product.price;
            var extrasTotal = (extras || []).reduce(function(s, e) { return s + (e.preco || 0); }, 0);
            var itemTotal = unitPrice + extrasTotal;
            var key = product.id + '|' + (size || '') + '|' + (extras||[]).map(function(e){return e.nome;}).join(',');
            var existing = null;
            cartState.forEach(function(i) { if (i.key === key) existing = i; });
            if (existing) {
                existing.qty += 1;
            } else {
                cartState.push({
                    key: key, id: product.id,
                    name: product.name + (size ? ' (' + size + ')' : ''),
                    unitPrice: itemTotal, qty: 1,
                    extras: extras || [], icon: product.icon
                });
            }
            saveCart(); updateBadge(); renderCartItems();
            var headerBtn = document.getElementById('cart-btn');
            headerBtn.classList.remove('cart-pop');
            void headerBtn.offsetWidth;
            headerBtn.classList.add('cart-pop');
            setTimeout(function() { headerBtn.classList.remove('cart-pop'); }, 300);
        }

        // --- changeQty ---
        function changeQty(key, delta) {
            var idx = -1;
            cartState.forEach(function(item, i) { if (item.key === key) idx = i; });
            if (idx === -1) return;
            cartState[idx].qty += delta;
            if (cartState[idx].qty <= 0) cartState.splice(idx, 1);
            saveCart(); updateBadge(); renderCartItems();
        }

        // --- renderCartItems ---
        var cartItemsList = document.getElementById('cart-items-list');
        var cartEmptyState = document.getElementById('cart-empty-state');
        var cartCheckout = document.getElementById('cart-checkout-section');
        var cartTotalEl = document.getElementById('cart-total');

        function renderCartItems() {
            cartItemsList.innerHTML = '';
            if (cartState.length === 0) {
                cartEmptyState.style.display = 'flex';
                cartCheckout.classList.add('hidden');
                cartItemsList.style.display = 'none';
                return;
            }
            cartEmptyState.style.display = 'none';
            cartCheckout.classList.remove('hidden');
            cartItemsList.style.display = 'block';
            var total = 0;
            cartState.forEach(function(item) {
                total += item.unitPrice * item.qty;
                var div = document.createElement('div');
                div.className = 'cart-item';
                var extrasHtml = (item.extras && item.extras.length > 0)
                    ? '<p class="text-[11px] text-slate-500 mt-0.5 leading-tight">' + item.extras.map(function(e){ return e.nome; }).join(', ') + '</p>'
                    : '';
                div.innerHTML =
                    '<div class="w-9 h-9 rounded-lg bg-[#2a2a2a] flex items-center justify-center shrink-0 text-slate-500">' +
                        '<span class="material-symbols-outlined text-[20px]">' + item.icon + '</span>' +
                    '</div>' +
                    '<div class="flex-1 min-w-0">' +
                        '<p class="font-body text-sm text-slate-100 font-semibold truncate">' + item.name + '</p>' +
                        extrasHtml +
                        '<p class="text-accent font-display font-bold text-sm mt-0.5">R$ ' + item.unitPrice.toFixed(2) + '</p>' +
                    '</div>' +
                    '<div class="flex items-center gap-2 shrink-0">' +
                        '<button class="qty-btn" data-key="' + item.key + '" data-delta="-1">−</button>' +
                        '<span class="text-slate-200 font-bold text-sm w-5 text-center">' + item.qty + '</span>' +
                        '<button class="qty-btn" data-key="' + item.key + '" data-delta="1">+</button>' +
                    '</div>';
                div.querySelectorAll('.qty-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        changeQty(btn.dataset.key, parseInt(btn.dataset.delta));
                    });
                });
                cartItemsList.appendChild(div);
            });
            cartTotalEl.textContent = 'R$ ' + total.toFixed(2);
        }

        // --- Drawer ---
        var cartDrawer = document.getElementById('cart-drawer');
        var cartOverlay = document.getElementById('cart-overlay');
        function openCart() { cartDrawer.classList.add('open'); cartOverlay.classList.add('open'); }
        function closeCart() { cartDrawer.classList.remove('open'); cartOverlay.classList.remove('open'); }

        document.getElementById('cart-btn').addEventListener('click', openCart);
        document.getElementById('close-cart-btn').addEventListener('click', closeCart);
        cartOverlay.addEventListener('click', closeCart);

        // --- Delivery toggle ---
        document.querySelectorAll('input[name="delivery-type"]').forEach(function(radio) {
            radio.addEventListener('change', function() {
                var addr = document.getElementById('address-fields');
                if (this.value === 'delivery') { addr.classList.remove('hidden'); }
                else { addr.classList.add('hidden'); }
            });
        });

        // --- WhatsApp ---
        function buildWhatsAppMessage() {
            var name = document.getElementById('cart-name').value.trim();
            var deliveryType = document.querySelector('input[name="delivery-type"]:checked').value;
            var street = document.getElementById('cart-street').value.trim();
            var neighborhood = document.getElementById('cart-neighborhood').value.trim();
            var reference = document.getElementById('cart-reference').value.trim();
            
            if (!name) { alert('Por favor, informe seu nome.'); return null; }
            if (deliveryType === 'delivery' && !street) { alert('Por favor, informe o endereço.'); return null; }
            
            var total = 0;
            var lines = ['*Novo Pedido - Sabor de Mel* 🍯', ''];
            
            cartState.forEach(function(item) {
                var sub = item.unitPrice * item.qty;
                total += sub;
                
                // Produto e Preço
                lines.push('*' + item.qty + 'x ' + item.name + '*');
                lines.push('Subtotal: R$ ' + sub.toFixed(2));
                
                // Personalizações agrupadas
                if (item.extras && item.extras.length > 0) {
                    var grouped = {};
                    item.extras.forEach(function(e) {
                        var cat = e.categoria || 'Extras';
                        if (!grouped[cat]) grouped[cat] = [];
                        grouped[cat].push(e.nome + (e.preco > 0 ? ' (+R$ ' + e.preco.toFixed(2) + ')' : ''));
                    });
                    
                    Object.keys(grouped).forEach(function(cat) {
                        // Capitaliza a primeira letra da categoria
                        var catName = cat.charAt(0).toUpperCase() + cat.slice(1);
                        lines.push(' \u25ab _' + catName + ':_ ' + grouped[cat].join(', '));
                    });
                }
                lines.push(''); // Espaço entre itens
            });
            
            lines.push('---------------------------');
            lines.push('*Total do Pedido: R$ ' + total.toFixed(2) + '*');
            lines.push('---------------------------');
            lines.push('');
            lines.push('\ud83d\udc64 *Cliente:* ' + name);
            
            if (deliveryType === 'delivery') {
                lines.push('\ud83d\udee5 *Entrega:* Delivery');
                lines.push('\ud83d\udccd *Endereço:* ' + street + (neighborhood ? ', ' + neighborhood : ''));
                if (reference) lines.push('\ud83d\udd16 *REF:* ' + reference);
            } else {
                lines.push('\ud83c\udfea *Retirada* no local');
            }
            
            return lines.join('\n');
        }

        document.getElementById('whatsapp-btn').addEventListener('click', function() {
            var msg = buildWhatsAppMessage();
            if (!msg) return;
            window.open('https://wa.me/' + WHATSAPP_NUMBER + '?text=' + encodeURIComponent(msg), '_blank');
        });

        document.getElementById('modal-add-btn').addEventListener('click', function() {
            if (!currentModalProduct) return;
            
            var finalExtras = [];
            // Seleções gratuitas
            Object.keys(currentModalSelections).forEach(function(cat) {
                currentModalSelections[cat].forEach(function(item) {
                    finalExtras.push({ nome: item, categoria: cat, preco: 0 });
                });
            });
            // Adicionais pagos
            currentModalExtras.forEach(function(e) {
                finalExtras.push({ nome: e.nome, categoria: 'Adicionais', preco: e.preco });
            });

            addToCart(currentModalProduct, currentModalSize, finalExtras);
            closeModal();
            openCart();
        });

        // --- Init ---
        loadCart();
        updateBadge();
        renderCartItems();
        renderProducts();

    })();
    </script>
</body>
</html>
