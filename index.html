        tailwind.config = {

                        "accent": "#f26522",

                        "surface-dark": "#1e1e1e",
                        "surface-dark-alt": "#2a2a2a"

                }
            }
        }

    <style>
        body { min-height: 100dvh; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: opacity 0.3s ease, transform 0.3s ease; }
        .product-card.card-visible { opacity: 1; transform: translateY(0) scale(1); }
        .category-chip.active { background-color: #edcd2c; color: #131313; font-weight: 600; border-color: transparent; }

            </div>
        </div>

        <div class="px-5">

                <button class="category-chip active flex h-10 shrink-0 items-center justify-center rounded-full bg-primary px-6 text-background-dark font-semibold text-sm transition-all" data-category="all">Todos</button>
                <button class="category-chip flex h-10 shrink-0 items-center justify-center rounded-full bg-surface-dark border border-surface-dark-alt px-6 text-slate-300 font-medium text-sm transition-all" data-category="pasteis">Pastéis</button>

                <button class="category-chip flex h-10 shrink-0 items-center justify-center rounded-full bg-surface-dark border border-surface-dark-alt px-6 text-slate-300 font-medium text-sm transition-all" data-category="bebidas">Bebidas</button>
            </div>
        </div>

        <div class="px-5">
            <div id="product-list" class="flex flex-col gap-4"></div>
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-16 text-center">
                <span class="material-symbols-outlined text-[64px] text-slate-600 mb-4">search_off</span>

                <p class="font-body text-sm text-slate-500 mt-2">Tente buscar por outro termo.</p>
            </div>
        </div>
    </main>

            { id: 'b-fanta-ls', category: 'bebidas', name: 'Fanta LS Retornável', price: 7.50, description: 'Garrafa retornável', icon: 'liquor' },

            // Monster
            { id: 'b-monster', category: 'bebidas', name: 'Monster Energy', price: 10.00, description: 'Lata 269ml', icon: 'bolt' }
        ];

        var searchInput = document.getElementById('search-input');
        var productList = document.getElementById('product-list');
        var emptyState = document.getElementById('empty-state');
        var chips = document.querySelectorAll('.category-chip');
        var modal = document.getElementById('product-modal');
        var modalContent = document.getElementById('modal-content');
        var closeBtn = document.getElementById('close-modal');
        var activeCategory = 'all';

        function renderProducts() {
            var query = (searchInput.value || '').trim().toLowerCase();
            productList.innerHTML = '';
            var filtered = PRODUCTS.filter(function(p) {
                var matchesCat = activeCategory === 'all' || p.category === activeCategory;
                var matchesSearch = !query || p.name.toLowerCase().indexOf(query) !== -1 || p.description.toLowerCase().indexOf(query) !== -1;
                return matchesCat && matchesSearch;
            });

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            filtered.forEach(function(p) {
                var card = document.createElement('div');
                card.className = 'product-card card-visible flex items-center gap-4 p-4 rounded-2xl bg-surface-dark border border-surface-dark-alt/20 hover:border-surface-dark-alt/50 transition-all cursor-pointer';
                var isVariable = !!p.prices;
                var price = isVariable ? Object.values(p.prices)[0] : p.price;
                var sizeOptions = '';
                if (isVariable) {
                    sizeOptions = '<select class="size-sel bg-surface-dark-alt text-[10px] text-primary p-1 rounded uppercase border-none focus:ring-0">';
                    Object.keys(p.prices).forEach(function(s) {
                        sizeOptions += '<option value="' + s + '">' + s + '</option>';
                    });
                    sizeOptions += '</select>';
                }
                card.innerHTML = '<div class="w-[72px] h-[72px] rounded-xl bg-surface-dark-alt shrink-0 flex items-center justify-center text-slate-500 overflow-hidden">' +
                    '<span class="material-symbols-outlined text-[32px]">' + p.icon + '</span>' +
                    '</div>' +
                    '<div class="flex-1 min-w-0">' +
                    '<h4 class="font-display font-semibold text-[15px] truncate text-slate-100">' + p.name + '</h4>' +
                    '<p class="font-body text-[13px] text-slate-400 truncate">' + p.description + '</p>' +
                    '<div class="flex items-center gap-3 mt-2">' +
                    '<div class="price font-display font-bold text-accent text-[16px]">R$ ' + price.toFixed(2) + '</div>' +
                    sizeOptions +
                    '</div>' +
                    '</div>' +
                    '<button class="add-btn w-9 h-9 rounded-full bg-primary text-background-dark flex items-center justify-center shrink-0">' +
                    '<span class="material-symbols-outlined text-[20px]">add</span>' +
                    '</button>';

                if (isVariable) {
                    var sel = card.querySelector('.size-sel');
                    sel.addEventListener('change', function(e) {
                        e.stopPropagation();
                        card.querySelector('.price').textContent = 'R$ ' + p.prices[e.target.value].toFixed(2);
                    });
                    sel.addEventListener('click', function(e) { e.stopPropagation(); });
                }
                card.querySelector('.add-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (p.hasCustomization) { openModal(p); } else { alert('Adicionado: ' + p.name); }
                });
                card.addEventListener('click', function() {
                    if (p.hasCustomization) openModal(p);
                });
                productList.appendChild(card);
            });
        }

        function openModal(p) {
            document.getElementById('modal-title').textContent = p.name;
            document.getElementById('modal-description').textContent = p.description;
            document.getElementById('modal-icon').textContent = p.icon;
            var opts = document.getElementById('modal-options');
            opts.innerHTML = '';

            if (p.prices) {
                var html = '<span class="text-[10px] font-bold text-slate-500 uppercase">Tamanhos</span><div class="flex gap-2 flex-wrap">';
                Object.keys(p.prices).forEach(function(s) {
                    html += '<button class="flex-1 p-2 rounded-lg bg-surface-dark-alt border border-primary/20 text-xs font-bold text-slate-200">' + s + '<br>R$ ' + p.prices[s].toFixed(2) + '</button>';
                });
                html += '</div>';
                opts.innerHTML += html;
            }

            if (p.id.indexOf('acai') !== -1) {
                var cremes = ['Cupuaçu', 'Ninho c/ Oreo', 'Ninho c/ Nutella', 'Ovomaltine'];
                var coberturas = ['Chocolate', 'Morango', 'Leite Condensado'];
                var frutas = ['Banana', 'Uva'];
                var complementos = ['Gotas de Chocolate', 'Chocoball', 'Ovomaltine', 'Granola', 'Farinha Lacta', 'Leite em Pó', 'Amendoim', 'Paçoca', 'M&M', 'Bis', 'Sucrilhos', 'Cereal', 'Jujuba', 'Canudinhos Wafer', 'Marshmallow'];

                var sections = [
                    { title: 'Creme (1)', items: cremes },
                    { title: 'Cobertura (1)', items: coberturas },
                    { title: 'Fruta (1)', items: frutas },
                    { title: 'Complementos', items: complementos }
                ];

                sections.forEach(function(sec) {
                    var secHtml = '<div class="mt-3"><span class="text-[10px] font-bold text-slate-500 uppercase">' + sec.title + '</span><div class="grid grid-cols-2 gap-2 mt-1">';
                    sec.items.forEach(function(item) {
                        secHtml += '<div class="flex items-center gap-2 p-2 bg-surface-dark-alt rounded-lg text-[11px] text-slate-300"><input type="checkbox" class="rounded border-slate-700 bg-background-dark text-primary focus:ring-primary h-3 w-3">' + item + '</div>';
                    });
                    secHtml += '</div></div>';
                    opts.innerHTML += secHtml;
                });

                // Adicionais com preço
                var adicionais = [
                    { nome: 'Morango', preco: 3 },
                    { nome: 'Kiwi', preco: 3 },
                    { nome: 'Nutella', preco: 3 },
                    { nome: 'Kit Kat', preco: 3 },
                    { nome: 'Mousse de Maracujá', preco: 5 }
                ];
                var adHtml = '<div class="mt-3"><span class="text-[10px] font-bold text-slate-500 uppercase">Adicionais (+R$)</span><div class="grid grid-cols-2 gap-2 mt-1">';
                adicionais.forEach(function(a) {
                    adHtml += '<div class="flex items-center gap-2 p-2 bg-surface-dark-alt rounded-lg text-[11px] text-slate-300"><input type="checkbox" class="rounded border-slate-700 bg-background-dark text-primary focus:ring-primary h-3 w-3">' + a.nome + ' +R$ ' + a.preco.toFixed(2) + '</div>';
                });
                adHtml += '</div></div>';
                opts.innerHTML += adHtml;
            }

            var initialPrice = p.prices ? Object.values(p.prices)[0] : p.price;
            document.getElementById('modal-total-price').textContent = 'R$ ' + initialPrice.toFixed(2);

            modal.classList.remove('hidden');
            setTimeout(function() { modal.classList.remove('opacity-0'); modalContent.classList.remove('scale-95'); }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(function() { modal.classList.add('hidden'); }, 300);
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });

        chips.forEach(function(c) {
            c.addEventListener('click', function() {
                chips.forEach(function(x) {
                    x.classList.remove('active', 'bg-primary', 'text-background-dark');
                    x.classList.add('bg-surface-dark', 'text-slate-300');
                });
                c.classList.add('active', 'bg-primary', 'text-background-dark');
                activeCategory = c.dataset.category;
                renderProducts();
            });
        });

        searchInput.addEventListener('input', function() { renderProducts(); });
        renderProducts();
    })();
    </script>
</body>
</html>
